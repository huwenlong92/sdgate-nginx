# SDKit Gate Nginx reverse proxy example.
#
# Replace:
# - gate.sdkit.cn with your domain.
# - /etc/nginx/ssl/cf.pem and /etc/nginx/ssl/cf.key with your cert files.
# - 127.0.0.1:9100 with the local SDKit Gate listen address.

map $http_cf_connecting_ip $sdgate_real_ip {
    default $http_cf_connecting_ip;
    ""      $remote_addr;
}

upstream sdgate_backend {
    server 127.0.0.1:9100;
    keepalive 32;
}

server {
    listen 80;
    server_name gate.sdkit.cn;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name gate.sdkit.cn;

    client_max_body_size 20m;

    ssl_certificate     /etc/nginx/ssl/cf.pem;
    ssl_certificate_key /etc/nginx/ssl/cf.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    access_log /var/log/nginx/sdgate.access.log;
    error_log  /var/log/nginx/sdgate.error.log warn;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/javascript image/svg+xml;

    location /assets/ {
        proxy_pass http://sdgate_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $sdgate_real_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://sdgate_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $sdgate_real_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        proxy_buffering on;
        proxy_redirect off;
    }
}
